name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: pi/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Reject Windows-illegal filenames
        run: |
          BAD=$(git ls-files | grep -E '[<>:"|?*]' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Files with characters illegal on Windows:"
            echo "$BAD"
            exit 1
          fi

      - name: Install dependencies
        run: bun run bootstrap:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run validation suite
        run: bun run validate:ci

  ui-validation-webui:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: pi/package-lock.json

      - name: Install dependencies
        run: bun run bootstrap:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Chromium
        run: |
          bunx playwright-core install --with-deps chromium
          node -e "require('node:fs').appendFileSync(process.env.GITHUB_ENV, 'CRAFT_UI_BROWSER_EXECUTABLE=' + require('playwright-core').chromium.executablePath() + '\n')"

      - name: Run WebUI validation smoke
        run: bun run test:ui-validation:stability
        env:
          CRAFT_UI_BROWSER_NO_SANDBOX: "1"
          CRAFT_UI_STABILITY_SURFACES: webui
          CRAFT_UI_STABILITY_ITERATIONS: "1"

      - name: Upload WebUI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: craft-ui-webui-evidence
          path: output/craft-ui
          if-no-files-found: warn

  ui-validation-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: pi/package-lock.json

      - name: Install dependencies
        run: bun run bootstrap:ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Pi binary runtime
        run: bun run pi:build:binary

      - name: Run Electron and native validation
        run: bun run test:ui-validation:electron

      - name: Run renderer recovery validation
        run: bun run test:ui-validation:recovery
        env:
          CRAFT_UI_SKIP_BUILD: "1"

      - name: Upload Electron evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: craft-ui-windows-evidence
          path: output/craft-ui
          if-no-files-found: warn

  pi-build-check-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: pi/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        continue-on-error: true
        run: npm test
