    - generic [ref=f3e636]:
      - heading [level=1] [ref=f3e637]:
        - text: v0.10.4 — GLM-5 family on
        - link "z.ai" [ref=f3e638] [cursor=pointer]:
          - /url: http://z.ai
        - text: + Pi SDK uplift
      - heading "Features" [level=2] [ref=f3e639]
      - list [ref=f3e640]:
        - listitem [ref=f3e641]:
          - strong [ref=f3e642]:
            - text: GLM-5.2 and the GLM-5 family now available on
            - link "z.ai" [ref=f3e643] [cursor=pointer]:
              - /url: http://z.ai
          - text: — the Pi SDK uplift regenerates the model catalog from models.dev, so
          - link "z.ai" [ref=f3e644] [cursor=pointer]:
            - /url: http://z.ai
          - text: "'s GLM-5.2, GLM-5.1, and GLM-5-turbo surface automatically on the existing"
          - link "z.ai" [ref=f3e645] [cursor=pointer]:
            - /url: http://z.ai
          - text: provider, with correct thinking /
          - code [ref=f3e646]: reasoning_effort
          - text: handling (fixed upstream). Previously GLM-5.2 was only reachable through a hand-rolled OpenAI-compatible endpoint where reasoning effort misbehaved. (
          - code [ref=f3e647]: 694d4b1c
          - text: )
        - listitem [ref=f3e648]:
          - strong [ref=f3e649]:
            - text: Automatic
            - link "config.json" [ref=f3e650] [cursor=pointer]:
              - /url: config.json
            - text: backups on startup
          - text: — Craft Agent now snapshots
          - code [ref=f3e651]: config.json
          - text: on every startup and keeps the newest three backups, so a corrupted or bad config write can be recovered. (
          - code [ref=f3e652]: a5e62bc8
          - text: )
      - heading "Improvements" [level=2] [ref=f3e653]
      - list [ref=f3e654]:
        - listitem [ref=f3e655]:
          - strong [ref=f3e656]:
            - text: Pi SDK uplifted to 0.79.9 (scope migration to
            - code [ref=f3e657]: "@earendil-works"
            - text: )
          - text: — the three Pi packages (
          - code [ref=f3e658]: pi-ai
          - text: ","
          - code [ref=f3e659]: pi-coding-agent
          - text: ","
          - code [ref=f3e660]: pi-agent-core
          - text: ) move from the now-frozen
          - code [ref=f3e661]: "@mariozechner/*"
          - text: scope at 0.73.1 to the rebranded
          - code [ref=f3e662]: "@earendil-works/*"
          - text: scope at 0.79.9, across all manifests and the lockfile. Newer models for existing Pi providers (OpenRouter,
          - link "z.ai" [ref=f3e663] [cursor=pointer]:
            - /url: http://z.ai
          - text: ", and others) appear automatically via the regenerated models.dev catalog. GitHub Copilot device-code login now consumes the SDK's structured"
          - code [ref=f3e664]: onDeviceCode
          - text: callback in place of a fragile free-text regex. No user-facing API breakage; the full typecheck and targeted Pi test suites pass clean. (
          - code [ref=f3e665]: 694d4b1c
          - text: )
      - heading "Bug Fixes" [level=2] [ref=f3e666]
      - list [ref=f3e667]:
        - listitem [ref=f3e668]:
          - strong [ref=f3e669]: Session titles now follow your chosen language
          - text: — AI-generated titles read your Appearance → Language setting directly from disk instead of the app's in-memory locale, which could still be on its English fallback when the first title generated. If you haven't picked a language, titles now auto-detect the language you're writing in rather than defaulting to English. Fixes
          - link "#885" [ref=f3e670] [cursor=pointer]:
            - /url: https://github.com/craft-ai-agents/craft-agents-oss/issues/885
          - text: . (
          - code [ref=f3e671]: 3ed130c0
          - text: )
        - listitem [ref=f3e672]:
          - strong [ref=f3e673]: Auto-update now keeps a diagnostic log
          - text: — the update lifecycle is recorded to an always-on log at
          - code [ref=f3e674]: ~/.craft-agent/logs/auto-update.log
          - text: ", even in release builds where the normal debug log is off. This makes \"the update downloaded but never installed\" reports diagnosable. Partially addresses"
          - link "#891" [ref=f3e675] [cursor=pointer]:
            - /url: https://github.com/craft-ai-agents/craft-agents-oss/issues/891
          - text: (diagnostics only; the ShipIt install hand-off fix is a follow-up). (
          - code [ref=f3e676]: 0e2005ca
          - text: )
        - listitem [ref=f3e677]:
          - strong [ref=f3e678]: Config backups no longer overwrite an existing same-day backup
          - text: — the earliest good snapshot from each day is preserved instead of being clobbered by a later same-day startup. (
          - code [ref=f3e679]: 42c79906
          - text: )
      - heading "Breaking Changes" [level=2] [ref=f3e680]
      - list [ref=f3e681]:
        - listitem [ref=f3e682]: None.
      - separator [ref=f3e683]
      - heading "v0.10.3 — Claude Fable 5" [level=1] [ref=f3e684]
      - heading "Features" [level=2] [ref=f3e685]
      - list [ref=f3e686]:
        - listitem [ref=f3e687]:
          - strong [ref=f3e688]: Claude Fable 5 is here
          - text: — Anthropic's most capable widely released model (GA 2026-06-09) is now available in Craft Agent on the Claude Agent SDK path, with a full 1M-token context window. It works across direct Anthropic connections and AWS Bedrock (us/eu/global inference-profile variants), with the model description localized in all 7 languages. Opus 4.8 remains the default — Fable is offered alongside it, not in front of it — and it is added to the Pi → Anthropic auth-bridge preferences below Opus. Because Fable 5 (and the Mythos 5 class) run with adaptive thinking always on and reject an explicit
          - code [ref=f3e689]: disabled
          - text: thinking option, the thinking resolver now maps the "off" and minimize-thinking cases to low-effort adaptive thinking for these models; Opus, Sonnet, and Haiku behavior is byte-for-byte unchanged. (
          - code [ref=f3e690]: 22c7ae99
          - text: )
      - heading "Improvements" [level=2] [ref=f3e691]
      - list [ref=f3e692]:
        - listitem [ref=f3e693]:
          - strong [ref=f3e694]: Claude Agent SDK uplifted to 0.3.170
          - text: —
          - code [ref=f3e695]: "@anthropic-ai/claude-agent-sdk"
          - text: moves from 0.3.154 → 0.3.170 (root plus the core and shared peer dependencies, lockfile refreshed). No API breakage; the full typecheck passes clean. (
          - code [ref=f3e696]: 22c7ae99
          - text: )
      - heading "Bug Fixes" [level=2] [ref=f3e697]
      - list [ref=f3e698]:
        - listitem [ref=f3e699]: None.
      - heading "Breaking Changes" [level=2] [ref=f3e700]
      - list [ref=f3e701]:
        - listitem [ref=f3e702]: None.
      - separator [ref=f3e703]
      - heading "v0.10.2 — Link labels, Anthropic account visibility, and prompt-cache fixes" [level=1] [ref=f3e704]
      - heading "Features" [level=2] [ref=f3e705]
      - list [ref=f3e706]:
        - listitem [ref=f3e707]:
          - paragraph [ref=f3e708]:
            - strong [ref=f3e709]: Link label value type
            - text: — Labels can now carry a
            - code [ref=f3e710]: link
            - text: value alongside the existing string/number/date types. A link value renders as a clickable chip (the URL scheme is stripped for display) that opens in your external browser, with a keyboard-accessible "Open link" action in the value popover. The type is threaded through the zod schema, CLI, and agent-prompt layers, and the clickable value appears consistently in the session list, chat display, and chat-input badges. Documented in
            - code [ref=f3e711]: labels.md
            - text: with validate/format/resolve tests. (
            - code [ref=f3e712]: 8aae50ad
            - text: )
        - listitem [ref=f3e713]:
          - paragraph [ref=f3e714]:
            - strong [ref=f3e715]: Resolved Anthropic account & org shown per OAuth connection
            - text: — Settings → LLM Connections now displays the real Anthropic identity ("email · org") each Claude OAuth grant resolves to, captured from the token-exchange response and persisted on the connection. When two connections in the same workspace resolve to the
            - emphasis [ref=f3e716]: same
            - text: Anthropic account (shared quota — a previously invisible mis-route), an amber warning is surfaced. This also fixes a load-bearing bug where
            - code [ref=f3e717]: updateLlmConnection
            - text: rebuilt connections from a hardcoded field allowlist and silently dropped any unlisted field on every save; the identity fields are now preserved with a round-trip test. Fixes
            - link "#838" [ref=f3e718] [cursor=pointer]:
              - /url: https://github.com/lukilabs/craft-agents-oss/issues/838
            - text: . (
            - code [ref=f3e719]: a4b8868e
            - text: )
        - listitem [ref=f3e720]:
          - paragraph [ref=f3e721]:
            - strong [ref=f3e722]: Last sent message restored to the input on Stop
            - text: "— Clicking Stop (an explicit cancel, not a redirect or new send) now copies your last sent message back into the chat input so you can tweak and resend it. It is append-safe: a draft typed while the agent was running is preserved, and the restored text is appended below it. Queued, never-sent messages continue to be handled by the existing restore path. ("
            - code [ref=f3e723]: cfbe802b
            - text: )
      - heading "Improvements" [level=2] [ref=f3e724]
      - list [ref=f3e725]:
        - listitem [ref=f3e726]: None.
      - heading "Bug Fixes" [level=2] [ref=f3e727]
      - list [ref=f3e728]:
        - listitem [ref=f3e729]:
          - paragraph [ref=f3e730]:
            - strong [ref=f3e731]: Pi prompt-cache no longer busts every turn
            - text: — The Pi adapter folded volatile context (minute-precision date/time,
            - code [ref=f3e732]: session_state
            - text: ", source state) into the system prompt, which pi-ai caches as the prefix ahead of all history — so re-stamping it each turn dropped"
            - code [ref=f3e733]: cacheRead
            - text: to 0 every turn (notably with non-Claude models such as DeepSeek V4).
            - code [ref=f3e734]: PromptBuilder.buildContextParts
            - text: is now split into
            - code [ref=f3e735]: buildVolatileContextParts
            - text: +
            - code [ref=f3e736]: buildStableContextParts
            - text: ; the Pi path keeps only stable blocks (workspace capabilities, working directory) in the cached prefix and routes volatile blocks to the user-message tail, mirroring what the Claude path already did. The Claude path stays byte-identical. Fixes
            - link "#862" [ref=f3e737] [cursor=pointer]:
              - /url: https://github.com/lukilabs/craft-agents-oss/issues/862
            - text: . (
            - code [ref=f3e738]: 80b478e3
            - text: )
        - listitem [ref=f3e739]:
          - paragraph [ref=f3e740]:
            - strong [ref=f3e741]: Accept-Plan chevron rotates when the dropdown opens
            - text: — Both Accept-Plan triggers render via Radix
            - code [ref=f3e742]: asChild
            - text: ", so"
            - code [ref=f3e743]: data-state="open"
            - text: landed on the host
            - code [ref=f3e744]: <button>
            - text: ", never on the nested chevron"
            - code [ref=f3e745]: <svg>
            - text: — the self-scoped
            - code [ref=f3e746]: data-[state=open]:rotate-180
            - text: never fired. The rotation is now scoped to a named group on the button (
            - code [ref=f3e747]: group/accept
            - text: +
            - code [ref=f3e748]: group-data-[state=open]/accept:rotate-180
            - text: ). Fixes
            - link "#840" [ref=f3e749] [cursor=pointer]:
              - /url: https://github.com/lukilabs/craft-agents-oss/issues/840
            - text: . (
            - code [ref=f3e750]: f97f483b
            - text: )
      - heading "Breaking Changes" [level=2] [ref=f3e751]
      - list [ref=f3e752]:
        - listitem [ref=f3e753]: None.
      - separator [ref=f3e754]
      - heading "v0.10.1 — Claude Opus 4.8 default, localized session titles, and Apple Silicon–only macOS builds" [level=1] [ref=f3e755]
      - heading "Features" [level=2] [ref=f3e756]
      - list [ref=f3e757]:
        - listitem [ref=f3e758]: None.
      - heading "Improvements" [level=2] [ref=f3e759]
      - list [ref=f3e760]:
        - listitem [ref=f3e761]:
          - strong [ref=f3e762]: Claude Opus 4.8 is now the default Opus model
          - text: — Upgraded the Claude Agent SDK to 0.3.154 and set Claude Opus 4.8 as the default Anthropic Opus model, while keeping Opus 4.7 selectable. The deprecated Opus 4.6 is removed from the model pickers. Existing direct-Anthropic Opus 4.7 defaults move to Opus 4.8, and Opus 4.5/4.6 selections migrate to the best available current Opus model. Bedrock mappings, Pi fallback handling, model-migration tests, docs, and UI examples were updated to match. (
          - code [ref=f3e763]: 0a1357b2
          - text: )
      - heading "Bug Fixes" [level=2] [ref=f3e764]
      - list [ref=f3e765]:
        - listitem [ref=f3e766]:
          - paragraph [ref=f3e767]:
            - strong [ref=f3e768]: Session titles honour the Settings → Appearance language
            - text: — The main-process i18n instance has no language-detection plugin (there is no
            - code [ref=f3e769]: localStorage
            - text: in Node) and was never re-hydrated from disk, so it always sat at the
            - code [ref=f3e770]: en
            - text: fallback after restart. Title generation (
            - code [ref=f3e771]: generateTitle
            - text: /
            - code [ref=f3e772]: refreshTitle
            - text: ) and the system prompt's "Preferred language" line read that main-process language, so they came back in English even when Appearance was set to another language. The chosen UI language is now persisted to an internal, validated
            - code [ref=f3e773]: uiLanguage
            - text: field and the main-process i18n is hydrated from it on startup; the renderer also pushes its resolved language to main once on upgrade so the value is learned without re-picking. Partially addresses
            - link "#815" [ref=f3e774] [cursor=pointer]:
              - /url: https://github.com/lukilabs/craft-agents-oss/issues/815
            - text: and
            - link "#738" [ref=f3e775] [cursor=pointer]:
              - /url: https://github.com/lukilabs/craft-agents-oss/issues/738
            - text: . (
            - code [ref=f3e776]: 4a743ef2
            - text: )
        - listitem [ref=f3e777]:
          - paragraph [ref=f3e778]:
            - strong [ref=f3e779]: Text-selection highlight stays aligned when scrolling a preview
            - text: — Selecting text inside a scrollable
            - code [ref=f3e780]: markdown-preview
            - text: block (the
            - code [ref=f3e781]: max-h-[400px] overflow-auto
            - text: wrapper) and adding a follow-up left the yellow range highlight and its numbered chip anchored to the original coordinates, so they drifted away from the text as the block scrolled. A capture-phase scroll listener now recomputes the overlay geometry on any nested scroll — a coords-only fast path coalesced with
            - code [ref=f3e782]: requestAnimationFrame
            - text: ", with a no-op short-circuit when there are no annotations — keeping the highlight pinned to its text. The same fix is mirrored in the viewer's annotation path. ("
            - code [ref=f3e783]: 14bba50c
            - text: )
      - heading "Breaking Changes" [level=2] [ref=f3e784]
      - list [ref=f3e785]:
        - listitem [ref=f3e786]:
          - paragraph [ref=f3e787]:
            - strong [ref=f3e788]: macOS Intel (x64) builds discontinued — Apple Silicon only
