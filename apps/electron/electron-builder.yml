appId: io.github.hrhgit.mortise
productName: Mortise
copyright: Copyright © 2026 Mortise Contributors

electronVersion: "39.2.7"
compression: normal

# Hook to compile macOS 26+ Liquid Glass icon after packaging
afterPack: scripts/afterPack.cjs
beforePack: scripts/beforePack.cjs
afterSign: scripts/afterSign.cjs

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  # The offline Developer Kit is staged under dist only as an intermediate
  # source for the dedicated extraResources entry below. Do not embed it in
  # resources/app/dist as a second copy.
  - "!dist/installer-developer-kit/**/*"
  - "!dist/renderer/src/**"
  - "!**/*.map"
  # Runtime subprocess assets are staged once through extraResources on each
  # platform. Keeping them in files as well duplicates the installer payload.
  - "!dist/resources/pi-runtime/**/*"
  - "!dist/resources/session-mcp-server/**/*"
  - "!dist/resources/scripts/**/*"
  - "!dist/resources/bin/**/*"
  - package.json
  # Include the bundled session MCP server for session-scoped tools.
  - resources/session-mcp-server/**/*
  # Note: Bundled assets (docs, themes, permissions, tool-icons) are in resources/
  # and copied to dist/resources/ by build:copy. They're included via dist/**/* above.
  # Include CLI tool Python scripts (platform-independent)
  - resources/scripts/**/*
  # Include CLI tool shell wrappers (platform-independent, both Unix and Windows)
  - resources/bin/markitdown
  - resources/bin/markitdown.cmd
  - resources/bin/pdf-tool
  - resources/bin/pdf-tool.cmd
  - resources/bin/xlsx-tool
  - resources/bin/xlsx-tool.cmd
  - resources/bin/doc-diff
  - resources/bin/doc-diff.cmd
  - resources/bin/img-tool
  - resources/bin/img-tool.cmd
  - resources/bin/docx-tool
  - resources/bin/docx-tool.cmd
  - resources/bin/pptx-tool
  - resources/bin/pptx-tool.cmd
  - resources/bin/ical-tool
  - resources/bin/ical-tool.cmd
  # Include bundled uv binary (platform-specific, only the relevant one ships per build)
  - resources/bin/darwin-arm64/**/*
  - resources/bin/darwin-x64/**/*
  - resources/bin/win32-x64/**/*
  - resources/bin/linux-x64/**/*
  # Bun is shipped once through platform extraResources below. Keeping it out
  # of app files prevents a second 90+ MiB copy under resources/app/vendor.
  - "!vendor/bun/**/*"
  # Exclude everything from node_modules (selected runtime binaries are copied via extraResources)
  - "!node_modules/**/*"

# Why extraResources instead of `files`: since electron-builder v20.15.2,
# `node_modules` directories are auto-excluded from `files`. extraResources
# bypasses that for selected runtime packages such as @vscode/ripgrep.
# See: https://github.com/electron-userland/electron-builder/issues/3104

extraMetadata:
  main: dist/main.cjs

# Disable ASAR to avoid decompression overhead and click delays
asar: false

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  # macOS 26+ Liquid Glass: Tell macOS to look for icon in Assets.car
  # The value must match --app-icon used in actool (see afterPack.js)
  extendInfo:
    CFBundleIconName: AppIcon
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    # Pi RpcClient CLI subprocess runtime (private node_modules tree).
    - from: dist/resources/pi-runtime
      to: pi-runtime
      filter:
        - "**/*"
    # ripgrep (used by packages/server-core/src/services/search.ts).
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: vendor/bun/bun
      to: vendor/bun/bun
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  # Exclude binaries for other platforms
  files:
    # A platform-only positive matcher prevents electron-builder from adding
    # an implicit **/* matcher for this otherwise exclusion-only list.
    - resources/icon.icns
    - "!**/resources/bin/win32-*/**"
    - "!**/resources/bin/linux-*/**"
  # Use predictable naming for macOS packages (applies to zip; dmg uses its own config below)
  artifactName: "Mortise-${arch}.${ext}"
  # Code signing & notarization are optional for local builds. Release jobs set
  # MORTISE_REQUIRE_CODE_SIGNING=1; the hooks fail before and after packaging if
  # credentials are absent or the resulting executable is not signed.
  # To enable: set CSC_LINK, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  # notarize:
  #   teamId: ${APPLE_TEAM_ID}

dmg:
  # Use predictable naming: Mortise-arm64.dmg, Mortise-x64.dmg
  artifactName: "Mortise-${arch}.dmg"
  # Custom background (multi-resolution TIFF with 1x+2x for retina support)
  background: resources/dmg-background.tiff
  # Use app icon as the mounted volume icon in Finder
  icon: resources/icon.icns
  iconSize: 80
  title: "Mortise"
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # Use predictable naming: Mortise-x64.exe
  artifactName: "Mortise-${arch}.${ext}"
  files:
    # Platform file rules are merged with the top-level allowlist. Repeating
    # positive matchers here schedules concurrent copies to the same target.
    # This non-overlapping anchor also prevents an implicit **/* matcher.
    - resources/icon.ico
    - "!dist/installer-developer-kit/**/*"
    # Exclude binaries for other platforms
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/linux-*/**"
    # WORKAROUND: Exclude Bun and uv from regular files on Windows.
    # electron-builder's npm node module collector causes EBUSY errors when copying
    # .exe files because it scans/locks files while simultaneously trying to copy them.
    # Moving them to extraResources avoids this by copying before the collector runs.
    # See: https://github.com/electron-userland/electron-builder/issues/8250
    - "!vendor/bun/**/*"
    - "!**/resources/bin/win32-x64/**"
  # Copy executables as extraResources to avoid EBUSY file locking (see comment above).
  # Bun is present exactly once at resources/vendor/bun/bun.exe.
  extraResources:
    - from: dist/resources/pi-runtime
      to: pi-runtime
      filter:
        - "**/*"
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: resources/bin/win32-x64
      to: app/resources/bin/win32-x64
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
    # The offline installer carries a version-matched Developer Kit. The NSIS
    # component page removes this directory when the optional component is off.
    - from: dist/installer-developer-kit
      to: developer-kit
      filter:
        - "**/*"

nsis:
  # Assisted installer shows the directory picker; auto-updates still run
  # silently from the app via autoUpdater.quitAndInstall(true, true).
  oneClick: false
  allowToChangeInstallationDirectory: true
  # Per-user install remains the default. The workspace bundle is executed from
  # a versioned user-data cache, so custom protected install directories work too.
  perMachine: false
  deleteAppDataOnUninstall: true
  include: resources/installer.nsh

linux:
  icon: resources/icon.png
  category: Utility
  maintainer: "Mortise Contributors"
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "Mortise-${arch}.${ext}"
  extraResources:
    - from: dist/resources/pi-runtime
      to: pi-runtime
      filter:
        - "**/*"
    - from: node_modules/@vscode/ripgrep
      to: app/node_modules/@vscode/ripgrep
    - from: vendor/bun/bun
      to: vendor/bun/bun
    # WhatsApp worker subprocess (self-contained; Baileys bundled in).
    - from: ../../packages/messaging-whatsapp-worker/dist/worker.cjs
      to: messaging-whatsapp-worker/worker.cjs
  # Exclude binaries for other platforms
  files:
    # A platform-only positive matcher prevents electron-builder from adding
    # an implicit **/* matcher for this otherwise exclusion-only list.
    - resources/icon.png
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/win32-*/**"
